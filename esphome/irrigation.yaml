substitutions:
  device_name: garden-irrigation
  friendly_name: "Garden Irrigation"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  ap:
    ssid: "${device_name}-fallback"
    password: !secret fallback_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

improv_serial:

# --- Status LED (WS2812 onboard) ---
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO38
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# --- Buzzer ---
output:
  - platform: ledc
    pin: GPIO21
    id: buzzer_out

rtttl:
  output: buzzer_out
  id: buzzer

# --- Scripts (single source of truth for zone logic) ---
script:
  - id: zone_started
    then:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
      - rtttl.play: "start:d=16,o=6,b=200:c,e"

  - id: zone_stopped
    then:
      - if:
          condition:
            and:
              - switch.is_off: zone_1
              - switch.is_off: zone_2
              - switch.is_off: zone_3
              - switch.is_off: zone_4
          then:
            - light.turn_off: status_led

  - id: zone_auto_off_1
    mode: restart
    then:
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - rtttl.play: "warn:d=16,o=5,b=200:e,c"
      - delay: 2s
      - switch.turn_off: zone_1

  - id: zone_auto_off_2
    mode: restart
    then:
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - rtttl.play: "warn:d=16,o=5,b=200:e,c"
      - delay: 2s
      - switch.turn_off: zone_2

  - id: zone_auto_off_3
    mode: restart
    then:
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - rtttl.play: "warn:d=16,o=5,b=200:e,c"
      - delay: 2s
      - switch.turn_off: zone_3

  - id: zone_auto_off_4
    mode: restart
    then:
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - rtttl.play: "warn:d=16,o=5,b=200:e,c"
      - delay: 2s
      - switch.turn_off: zone_4

# --- Rain Sensor (binary input on GPIO4) ---
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: "Rain Sensor"
    id: rain_sensor
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 5000ms
    on_press:
      - switch.turn_off: zone_1
      - switch.turn_off: zone_2
      - switch.turn_off: zone_3
      - switch.turn_off: zone_4
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
      - rtttl.play: "rain:d=4,o=5,b=100:8e6,8d6"
  - platform: template
    id: zone_1_active
    lambda: "return id(zone_1).state;"
    internal: true
  - platform: template
    id: zone_2_active
    lambda: "return id(zone_2).state;"
    internal: true
  - platform: template
    id: zone_3_active
    lambda: "return id(zone_3).state;"
    internal: true
  - platform: template
    id: zone_4_active
    lambda: "return id(zone_4).state;"
    internal: true

# --- Max runtime (configurable from HA) ---
number:
  - platform: template
    name: "Max Runtime"
    id: max_runtime
    icon: "mdi:timer-outline"
    unit_of_measurement: "min"
    min_value: 5
    max_value: 60
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true

# --- Irrigation Zone Switches (Relays CH1-CH4) ---
# Interlock: only one zone can be active at a time
# Auto-off: script with mode:restart fixes double-timer bug
switch:
  - platform: gpio
    pin: GPIO1
    name: "Zone 1"
    id: zone_1
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: &interlock_group [zone_1, zone_2, zone_3, zone_4]
    interlock_wait_time: 2s
    on_turn_on:
      - script.execute: zone_started
      - script.execute: zone_auto_off_1
    on_turn_off:
      - script.stop: zone_auto_off_1
      - script.execute: zone_stopped

  - platform: gpio
    pin: GPIO2
    name: "Zone 2"
    id: zone_2
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - script.execute: zone_started
      - script.execute: zone_auto_off_2
    on_turn_off:
      - script.stop: zone_auto_off_2
      - script.execute: zone_stopped

  - platform: gpio
    pin: GPIO41
    name: "Zone 3"
    id: zone_3
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - script.execute: zone_started
      - script.execute: zone_auto_off_3
    on_turn_off:
      - script.stop: zone_auto_off_3
      - script.execute: zone_stopped

  - platform: gpio
    pin: GPIO42
    name: "Zone 4"
    id: zone_4
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - script.execute: zone_started
      - script.execute: zone_auto_off_4
    on_turn_off:
      - script.stop: zone_auto_off_4
      - script.execute: zone_stopped

# --- Runtime counters per zone (total seconds) ---
sensor:
  - platform: uptime
    name: "Uptime"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: duty_time
    name: "Zone 1 Total Runtime"
    id: zone_1_runtime
    sensor: zone_1_active
    restore: true
    icon: "mdi:timer-sand"

  - platform: duty_time
    name: "Zone 2 Total Runtime"
    id: zone_2_runtime
    sensor: zone_2_active
    restore: true
    icon: "mdi:timer-sand"

  - platform: duty_time
    name: "Zone 3 Total Runtime"
    id: zone_3_runtime
    sensor: zone_3_active
    restore: true
    icon: "mdi:timer-sand"

  - platform: duty_time
    name: "Zone 4 Total Runtime"
    id: zone_4_runtime
    sensor: zone_4_active
    restore: true
    icon: "mdi:timer-sand"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

button:
  - platform: restart
    name: "Restart"
