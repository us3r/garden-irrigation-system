substitutions:
  device_name: garden-irrigation
  friendly_name: "Garden Irrigation"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"
    password: !secret fallback_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- Status LED (WS2812 onboard) ---
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO38
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# --- Buzzer ---
output:
  - platform: ledc
    pin: GPIO21
    id: buzzer_out

rtttl:
  output: buzzer_out
  id: buzzer

# --- Rain Sensor (binary input on GPIO4) ---
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: "Rain Sensor"
    id: rain_sensor
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 5000ms
    on_press:
      - switch.turn_off: zone_1
      - switch.turn_off: zone_2
      - switch.turn_off: zone_3
      - switch.turn_off: zone_4
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
      - rtttl.play: "rain:d=4,o=5,b=100:8e6,8d6"

# --- Max runtime (configurable from HA) ---
number:
  - platform: template
    name: "Max Runtime"
    id: max_runtime
    icon: "mdi:timer-outline"
    unit_of_measurement: "min"
    min_value: 5
    max_value: 60
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true

# --- Irrigation Zone Switches (Relays CH1-CH4) ---
# Interlock: only one zone can be active at a time
# Max runtime: auto-off after 30 minutes (safety against flooding)
switch:
  - platform: gpio
    pin: GPIO1
    name: "Zone 1"
    id: zone_1
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: &interlock_group [zone_1, zone_2, zone_3, zone_4]
    interlock_wait_time: 2s
    on_turn_on:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - switch.turn_off: zone_1
    on_turn_off:
      - if:
          condition:
            and:
              - switch.is_off: zone_2
              - switch.is_off: zone_3
              - switch.is_off: zone_4
          then:
            - light.turn_off: status_led

  - platform: gpio
    pin: GPIO2
    name: "Zone 2"
    id: zone_2
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - switch.turn_off: zone_2
    on_turn_off:
      - if:
          condition:
            and:
              - switch.is_off: zone_1
              - switch.is_off: zone_3
              - switch.is_off: zone_4
          then:
            - light.turn_off: status_led

  - platform: gpio
    pin: GPIO41
    name: "Zone 3"
    id: zone_3
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - switch.turn_off: zone_3
    on_turn_off:
      - if:
          condition:
            and:
              - switch.is_off: zone_1
              - switch.is_off: zone_2
              - switch.is_off: zone_4
          then:
            - light.turn_off: status_led

  - platform: gpio
    pin: GPIO42
    name: "Zone 4"
    id: zone_4
    icon: "mdi:sprinkler-variant"
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: 2s
    on_turn_on:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
      - delay: !lambda "return id(max_runtime).state * 60 * 1000;"
      - switch.turn_off: zone_4
    on_turn_off:
      - if:
          condition:
            and:
              - switch.is_off: zone_1
              - switch.is_off: zone_2
              - switch.is_off: zone_3
          then:
            - light.turn_off: status_led

# --- Uptime & WiFi signal sensors ---
sensor:
  - platform: uptime
    name: "Uptime"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

button:
  - platform: restart
    name: "Restart"
